  <rect x="910" y="88" width="150" height="32" rx="6" fill="#0f172a" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="985" y="109" text-anchor="middle" fill="#a78bfa" font-size="12">manifest.json</text>

