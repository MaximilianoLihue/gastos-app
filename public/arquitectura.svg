  <!-- Middleware → Layout -->
  <line x1="550" y1="204" x2="550" y2="224" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- Layout → Pages -->
  <line x1="550" y1="286" x2="550" y2="306" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- Pages → Components -->
  <line x1="550" y1="378" x2="550" y2="398" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- Pages → API -->
  <line x1="800" y1="378" x2="800" y2="490" stroke="#475569" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <!-- Components → Lib -->
  <line x1="400" y1="470" x2="400" y2="582" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- API → Lib -->
