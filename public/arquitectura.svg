  <rect x="210" y="88" width="130" height="32" rx="6" fill="#0f172a" stroke="#475569"/>
  <text x="275" y="109" text-anchor="middle" fill="#e2e8f0" font-size="12">/register</text>
  <rect x="360" y="88" width="180" height="32" rx="6" fill="#0f172a" stroke="#475569"/>
  <text x="450" y="109" text-anchor="middle" fill="#e2e8f0" font-size="12">ServiceWorkerRegister</text>
  <rect x="560" y="88" width="160" height="32" rx="6" fill="#0f172a" stroke="#7c3aed" stroke-width="1.5"/>
