  <!-- Lib → External -->
  <line x1="690" y1="654" x2="690" y2="674" stroke="#06b6d4" stroke-width="1.5" marker-end="url(#arrc)"/>
  <!-- Supabase → DB Tables -->
  <line x1="862" y1="714" x2="870" y2="714" stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Arrow markers -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#475569"/>
    </marker>
    <marker id="arrc" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#06b6d4"/>
    </marker>
  </defs>

  <!-- Legend -->
