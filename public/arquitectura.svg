  <rect x="560" y="800" width="14" height="14" rx="3" fill="#7c3aed"/>
  <text x="580" y="812" fill="#94a3b8" font-size="11">PWA</text>
  <rect x="650" y="800" width="14" height="14" rx="3" fill="#06b6d4"/>
  <text x="670" y="812" fill="#94a3b8" font-size="11">Servicios externos</text>
  <line x1="810" y1="807" x2="840" y2="807" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="848" y="812" fill="#94a3b8" font-size="11">Llamada async</text>
